name: ci

on:
  push:
    branches: ["main"]
  pull_request: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Setup
        run: make setup
      - name: Lint
        run: make lint
      - name: Test
        run: make test
      - name: Validate examples (guardrails)
        run: .venv/bin/python -m portfolio_proof validate --inputs examples/good --repo-root .
      - name: Build artifact tag (immutable)
        run: echo "image_tag=${GITHUB_SHA}" > artifacts/image_tag.txt

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [validate-and-test]
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy (example only)
        run: |
          echo "Deploying ${GITHUB_SHA} to staging (example)"
          echo "kubectl rollout status deploy/onchain-gateway --timeout=5m (example)"

